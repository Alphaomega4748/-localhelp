name: LocalHelp CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run tests with coverage
        run: cd backend && npm test
        env:
          JWT_SECRET: test_secret_for_ci
          NODE_ENV: test

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          directory: backend/coverage

  lint-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build production
        run: cd frontend && npm run build
        env:
          REACT_APP_API_URL: https://api.localhelp.app

  deploy:
    name: Deploy to Production
    needs: [test-backend, lint-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy backend to Render
        run: echo "Deploy triggered — configure Render webhook here"

      - name: Deploy frontend to Vercel
        run: echo "Deploy triggered — configure Vercel CLI here"
